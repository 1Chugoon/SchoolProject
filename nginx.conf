events {}

http {
  server {
    listen 80;
    client_max_body_size 100M;
    server_name my-defense.ddns.net;

    location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

    location / {
      proxy_pass http://frontend:3000;
    }

    location /api/ {
      proxy_pass http://api:8080/;
    }
  }
}